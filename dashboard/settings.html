<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Settings - Voice AI Configuration</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-form {
            max-width: 920px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease 0.1s both;
        }

        .settings-section {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 28px;
            margin-bottom: 20px;
            transition: border-color var(--transition-smooth);
        }

        .settings-section:hover {
            border-color: var(--border-hover);
        }

        .settings-section h2 {
            margin-top: 0;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .section-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 22px;
        }

        .form-row label {
            flex: 1;
            min-width: 200px;
        }

        .form-row label strong {
            display: block;
            margin-bottom: 4px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .help-text {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .form-row input[type="range"] {
            flex: 2;
            min-width: 200px;
            accent-color: var(--primary);
            height: 6px;
            cursor: pointer;
        }

        .form-row input[type="text"],
        .form-row input[type="password"] {
            flex: 2;
            padding: 11px 14px;
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all var(--transition-smooth);
        }

        .form-row input[type="text"]:focus,
        .form-row input[type="password"]:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .value-display {
            min-width: 72px;
            text-align: right;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--primary-light);
            font-family: 'JetBrains Mono', 'Monaco', monospace;
        }

        .form-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 36px;
            padding-top: 28px;
            border-top: 1px solid var(--border-subtle);
        }

        .btn-large {
            padding: 14px 32px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .status-message {
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            animation: fadeInUp 0.3s ease;
        }

        .status-message.success {
            background: var(--success-glow);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .status-message.error {
            background: var(--danger-glow);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .status-message.info {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .status-message.hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .form-row input[type="range"],
            .form-row input[type="text"],
            .form-row input[type="password"] {
                width: 100%;
                min-width: unset;
            }

            .value-display {
                text-align: left;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-title">
                <h1>Bot Settings</h1>
                <p class="subtitle">Configure Voice AI Parameters</p>
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="location.href='index.html'" class="btn-secondary">Dashboard</button>
                <button onclick="location.href='scripts.html'" class="btn-secondary">Scripts</button>
            </div>
        </header>

        <!-- Settings Form -->
        <form id="settings-form" class="settings-form">

            <!-- VAD Settings Section -->
            <section class="settings-section">
                <h2>Voice Activity Detection (VAD)</h2>
                <p class="section-desc">Control how the bot detects when customers start and stop speaking.</p>

                <div class="form-row">
                    <label for="silence_timeout">
                        <strong>Silence Timeout</strong>
                        <span class="help-text">How long to wait after customer stops speaking (seconds)</span>
                    </label>
                    <input type="range" id="silence_timeout" name="vad.silence_timeout" min="0.3" max="5.0" step="0.1"
                        value="1.5">
                    <span class="value-display" id="silence_timeout_val">1.5s</span>
                </div>

                <div class="form-row">
                    <label for="min_speech_duration">
                        <strong>Minimum Speech Duration</strong>
                        <span class="help-text">Ignore speech shorter than this (seconds)</span>
                    </label>
                    <input type="range" id="min_speech_duration" name="vad.min_speech_duration" min="0.05" max="2.0"
                        step="0.05" value="0.1">
                    <span class="value-display" id="min_speech_duration_val">0.1s</span>
                </div>

                <div class="form-row">
                    <label for="interruption_threshold_db">
                        <strong>Interruption Threshold</strong>
                        <span class="help-text">Audio loudness required to detect speech (dB, lower = more
                            sensitive)</span>
                    </label>
                    <input type="range" id="interruption_threshold_db" name="vad.interruption_threshold_db" min="-50"
                        max="-20" step="1" value="-30">
                    <span class="value-display" id="interruption_threshold_db_val">-30 dB</span>
                </div>

                <div class="form-row">
                    <label for="noise_gate_db">
                        <strong>Noise Gate</strong>
                        <span class="help-text">Minimum audio level to process (dB, lower = picks up quieter
                            sounds)</span>
                    </label>
                    <input type="range" id="noise_gate_db" name="vad.noise_gate_db" min="-70" max="-40" step="1"
                        value="-55">
                    <span class="value-display" id="noise_gate_db_val">-55 dB</span>
                </div>
            </section>

            <!-- Voice Settings Section -->
            <section class="settings-section">
                <h2>Voice Characteristics</h2>
                <p class="section-desc">Adjust how the bot sounds</p>

                <div class="form-row">
                    <label for="speed">
                        <strong>Speaking Speed</strong>
                        <span class="help-text">How fast the bot speaks (1.0 = normal)</span>
                    </label>
                    <input type="range" id="speed" name="voice.speed" min="0.5" max="2.0" step="0.1" value="1.0">
                    <span class="value-display" id="speed_val">1.0x</span>
                </div>

                <div class="form-row">
                    <label for="stability">
                        <strong>Voice Stability</strong>
                        <span class="help-text">Lower = more expressive, Higher = more consistent</span>
                    </label>
                    <input type="range" id="stability" name="voice.stability" min="0" max="1" step="0.05" value="0.5">
                    <span class="value-display" id="stability_val">0.5</span>
                </div>

                <div class="form-row">
                    <label for="similarity_boost">
                        <strong>Similarity Boost</strong>
                        <span class="help-text">How closely to match the voice model</span>
                    </label>
                    <input type="range" id="similarity_boost" name="voice.similarity_boost" min="0" max="1" step="0.05"
                        value="0.75">
                    <span class="value-display" id="similarity_boost_val">0.75</span>
                </div>

                <div class="form-row">
                    <label for="style">
                        <strong>Speaking Style</strong>
                        <span class="help-text">Style intensity (0 = neutral, 1 = maximum style)</span>
                    </label>
                    <input type="range" id="style" name="voice.style" min="0" max="1" step="0.05" value="0.0">
                    <span class="value-display" id="style_val">0.0</span>
                </div>
            </section>

            <!-- API Credentials Section -->
            <section class="settings-section">
                <h2>API Credentials</h2>
                <p class="section-desc">GenArtML API configuration</p>

                <div class="form-row">
                    <label for="server_key">
                        <strong>GenArtML Server Key</strong>
                        <span class="help-text">AI service authentication key</span>
                    </label>
                    <input type="password" id="server_key" name="api_credentials.server_key"
                        placeholder="Enter server key..." class="text-input">
                </div>

                <div class="form-row">
                    <label for="secret_key">
                        <strong>GenArtML Secret Key</strong>
                        <span class="help-text">Voice synthesis authentication key</span>
                    </label>
                    <input type="password" id="secret_key" name="api_credentials.secret_key"
                        placeholder="Enter secret key..." class="text-input">
                </div>

                <div class="form-row">
                    <label for="voice_id">
                        <strong>GenArtML Voice ID</strong>
                        <span class="help-text">Voice model identifier</span>
                    </label>
                    <input type="text" id="voice_id" name="api_credentials.voice_id" placeholder="Enter voice ID..."
                        class="text-input">
                </div>
            </section>

            <!-- Action Buttons -->
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Save & Restart Server</button>
                <button type="button" onclick="loadSettings()" class="btn-secondary btn-large">Reset to
                    Current</button>
            </div>
        </form>

        <!-- Status Message -->
        <div id="status-message" class="status-message hidden"></div>
    </div>

    <script src="settings.js"></script>
</body>

</html>
